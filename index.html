<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CamTrust Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #F7F5F2; }
    a { text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }
    input, select { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

const C = {
  maroon:"#6B1E2E", plum:"#8B3A52", periwinkle:"#7B8EC8",
  offwhite:"#F7F5F2", surface:"#FFFFFF", text:"#1A1A1A",
  muted:"#6B7280", border:"#E5E3E0", success:"#2D7A4F", error:"#B91C1C",
};

function dbGet(uid,key){try{const v=localStorage.getItem(`ct_${uid}_${key}`);return v?JSON.parse(v):null;}catch{return null;}}
function dbSet(uid,key,val){try{localStorage.setItem(`ct_${uid}_${key}`,JSON.stringify(val));}catch(e){}}
function getAuthStore(){try{const v=localStorage.getItem("ct_auth");return v?JSON.parse(v):{};} catch{return{};}}
function saveAuthStore(s){localStorage.setItem("ct_auth",JSON.stringify(s));}
function getCurrentUser(){try{const v=localStorage.getItem("ct_cur");return v?JSON.parse(v):null;}catch{return null;}}
function setCurrentUser(u){u?localStorage.setItem("ct_cur",JSON.stringify(u)):localStorage.removeItem("ct_cur");}

const CHECKLIST=[
  {id:1,label:"Choose your business structure",desc:"LLC, Sole Prop, S-Corp — know the difference before you file",cat:"legal"},
  {id:2,label:"Register your business name",desc:"Check availability with your state's Secretary of State",cat:"legal"},
  {id:3,label:"File your Articles of Organization",desc:"Required to officially form your LLC with the state",cat:"legal"},
  {id:4,label:"Obtain your EIN",desc:"Free through IRS.gov — takes minutes online",cat:"tax"},
  {id:5,label:"Open a business bank account",desc:"Keep personal and business finances completely separate",cat:"finance"},
  {id:6,label:"Set up your accounting system",desc:"QuickBooks, Wave, or FreshBooks all work well",cat:"finance"},
  {id:7,label:"Register for state and local taxes",desc:"Nevada has no state income tax — still check local requirements",cat:"tax"},
  {id:8,label:"Get required licenses and permits",desc:"City business license, professional permits if applicable",cat:"legal"},
  {id:9,label:"Set up your business address",desc:"PO Box, virtual office, or registered agent service",cat:"ops"},
  {id:10,label:"Create your operating agreement",desc:"Especially important for multi-member LLCs",cat:"legal"},
  {id:11,label:"Get business insurance",desc:"General liability at minimum — E&O if you offer professional services",cat:"ops"},
  {id:12,label:"Build your online presence",desc:"Domain, website, and Google Business Profile",cat:"brand"},
];

const ENTITIES=[
  {id:"sole",name:"Sole Proprietorship",tagline:"Simplest structure. You are the business.",best:"Freelancers, side hustles, solo service providers just getting started",
   pros:["Zero setup cost or paperwork","Complete control over decisions","Simple taxes — report on your personal return","Easy to dissolve if needed"],
   cons:["No separation between you and the business","Personal assets at risk if sued","Harder to get business credit or loans","Less credibility with some clients"],
   tax:"Income reported on Schedule C of your personal tax return. Self-employment tax applies.",
   steps:["Start operating under your own name (no filing required)","File a DBA if using a business name","Get an EIN (optional but recommended)","Open a business bank account"]},
  {id:"llc",name:"LLC",tagline:"Limited Liability Company. The sweet spot for most small businesses.",best:"Consultants, small business owners, service providers who want protection without the complexity of a corporation",
   pros:["Personal assets protected from business liability","Flexible tax options","Less paperwork than a corporation","More credible to clients and vendors"],
   cons:["Filing fees vary by state ($50-$500+)","Annual reports required in most states","Self-employment tax still applies","More setup than a sole prop"],
   tax:"Taxed as a sole prop by default (pass-through). Can elect S-Corp status for tax savings at higher income levels.",
   steps:["Choose and check your business name","File Articles of Organization with your state","Get your EIN from IRS.gov","Draft an operating agreement","Open a business bank account"]},
  {id:"scorp",name:"S-Corporation",tagline:"Tax-efficient structure for established businesses with consistent revenue.",best:"Business owners making $50K+ in profit who want to reduce self-employment tax",
   pros:["Significant self-employment tax savings at higher income","Personal liability protection","Adds credibility and structure","Easier to bring on investors or partners"],
   cons:["Most complex to set up and maintain","Must pay yourself a reasonable salary","Stricter IRS requirements","Payroll setup required"],
   tax:"Salary portion subject to payroll tax. Remaining profit passes through without SE tax — this is where the savings come from.",
   steps:["Form an LLC or C-Corp first","File IRS Form 2553 to elect S-Corp status","Set up payroll for your salary","Open business accounts and keep detailed records"]},
];

const RESOURCES=[
  {title:"IRS EIN Application",desc:"Apply for your EIN — free and instant online",link:"https://www.irs.gov/businesses/small-businesses-self-employed/apply-for-an-employer-identification-number-ein-online",cat:"Tax"},
  {title:"Nevada SOS — Business Registration",desc:"File your LLC or corporation with the Nevada Secretary of State",link:"https://sos.nv.gov/businesses/main/",cat:"Legal"},
  {title:"Wave Accounting",desc:"Free invoicing, accounting, and receipt scanning for small businesses",link:"https://www.waveapps.com",cat:"Finance"},
  {title:"SBA Business Plan Guide",desc:"Step-by-step business plan builder from the Small Business Administration",link:"https://www.sba.gov/business-guide/plan-your-business/write-your-business-plan",cat:"Planning"},
  {title:"SCORE Free Mentorship",desc:"Free one-on-one mentoring from experienced business executives",link:"https://www.score.org",cat:"Support"},
  {title:"Nevada Business License Portal",desc:"Required state business license for most Nevada-based businesses",link:"https://sos.nv.gov/businesses/main/",cat:"Legal"},
  {title:"Gusto Payroll",desc:"Simple payroll, benefits, and HR for small businesses",link:"https://gusto.com",cat:"Finance"},
  {title:"Google Business Profile",desc:"Free listing that puts your business on Google Search and Maps",link:"https://business.google.com",cat:"Brand"},
  {title:"Canva for Business",desc:"Design logos, social graphics, and marketing materials for free",link:"https://www.canva.com",cat:"Brand"},
  {title:"Nevada SBDC",desc:"Free advising and resources for Nevada entrepreneurs",link:"https://nevadasbdc.org",cat:"Support"},
  {title:"Clerky — Legal Documents",desc:"Affordable legal document templates for small business owners",link:"https://www.clerky.com",cat:"Legal"},
  {title:"QuickBooks Self-Employed",desc:"Track income, expenses, and quarterly taxes in one place",link:"https://quickbooks.intuit.com/self-employed/",cat:"Finance"},
];

const APPTS={"Mon Jun 16":["9:00 AM","10:30 AM","2:00 PM"],"Tue Jun 17":["11:00 AM","1:00 PM","3:30 PM"],"Wed Jun 18":["9:00 AM","12:00 PM"],"Thu Jun 19":["10:00 AM","2:00 PM","4:00 PM"],"Fri Jun 20":["9:30 AM","11:00 AM"]};
const SERVICES=["Business Consultation","LLC Formation Assistance","Document Preparation","Notary Services","HR Compliance Review"];
const NAV_G=[{id:"home",label:"Home"},{id:"entities",label:"Entity Types"},{id:"resources",label:"Resources"}];
const NAV_A=[{id:"home",label:"Dashboard"},{id:"checklist",label:"Startup Checklist"},{id:"entities",label:"Entity Types"},{id:"vault",label:"Document Vault"},{id:"appointments",label:"Book Appointment"},{id:"resources",label:"Resources"}];

const btn=(v)=>({padding:v==="sm"?"7px 14px":"10px 18px",borderRadius:"8px",fontSize:v==="sm"?"12px":"13px",fontWeight:"600",cursor:"pointer",backgroundColor:v==="outline"||v==="ghost"?"transparent":v==="google"?C.surface:C.maroon,color:v==="outline"?C.maroon:v==="ghost"?C.muted:v==="google"?C.text:"#fff",border:v==="outline"?`1px solid ${C.maroon}`:v==="google"?`1px solid ${C.border}`:"none",display:"inline-flex",alignItems:"center",gap:"7px",justifyContent:"center",fontFamily:"inherit"});
const card={backgroundColor:C.surface,borderRadius:"12px",border:`1px solid ${C.border}`,padding:"22px",marginBottom:"14px"};
const input={width:"100%",padding:"10px 13px",borderRadius:"8px",border:`1px solid ${C.border}`,fontSize:"14px",color:C.text,backgroundColor:C.surface,outline:"none",boxSizing:"border-box",marginBottom:"10px",fontFamily:"inherit"};
const tag=(v)=>({display:"inline-block",fontSize:"11px",fontWeight:"600",padding:"3px 8px",borderRadius:"100px",backgroundColor:v==="maroon"?`${C.maroon}15`:`${C.periwinkle}20`,color:v==="maroon"?C.maroon:C.periwinkle,letterSpacing:"0.02em"});

function GoogleLogo(){return(<svg width="15" height="15" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>);}

function AuthScreen({onLogin,onGuest}){
  const[mode,setMode]=useState("login");
  const[name,setName]=useState("");
  const[email,setEmail]=useState("");
  const[pw,setPw]=useState("");
  const[err,setErr]=useState("");

  const submit=()=>{
    setErr("");
    const store=getAuthStore();
    if(mode==="signup"){
      if(!name.trim()){setErr("Please enter your name.");return;}
      if(store[email]){setErr("Account already exists.");return;}
      if(pw.length<6){setErr("Password must be at least 6 characters.");return;}
      const u={uid:`u_${Date.now()}`,name:name.trim(),email,provider:"email"};
      store[email]={...u,password:pw};saveAuthStore(store);setCurrentUser(u);onLogin(u);
    }else{
      const r=store[email];
      if(!r||r.password!==pw){setErr("Incorrect email or password.");return;}
      const u={uid:r.uid,name:r.name,email:r.email,provider:"email"};
      setCurrentUser(u);onLogin(u);
    }
  };

  const googleLogin=()=>{
    const store=getAuthStore();
    const fe=`g_${Date.now()}@gmail.demo`;
    const u={uid:`g_${Date.now()}`,name:"Google User",email:fe,provider:"google"};
    store[fe]={...u,password:null};saveAuthStore(store);setCurrentUser(u);onLogin(u);
  };

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",backgroundColor:C.offwhite,padding:"20px"}}>
      <div style={{backgroundColor:C.surface,borderRadius:"16px",border:`1px solid ${C.border}`,padding:"36px",width:"100%",maxWidth:"400px",boxShadow:"0 4px 24px rgba(0,0,0,0.06)"}}>
        <div style={{fontSize:"12px",fontWeight:"800",letterSpacing:"0.1em",color:C.maroon,textTransform:"uppercase",marginBottom:"3px"}}>CamTrust</div>
        <div style={{fontSize:"12px",color:C.muted,marginBottom:"24px"}}>Connect Portal</div>
        <div style={{fontSize:"21px",fontWeight:"800",marginBottom:"16px",letterSpacing:"-0.02em"}}>{mode==="login"?"Welcome back":"Create your account"}</div>
        {err&&<div style={{fontSize:"13px",color:C.error,marginBottom:"10px"}}>{err}</div>}
        {mode==="signup"&&<input style={input} placeholder="Full name" value={name} onChange={e=>setName(e.target.value)}/>}
        <input style={input} placeholder="Email address" value={email} onChange={e=>setEmail(e.target.value)} type="email"/>
        <input style={input} placeholder="Password" value={pw} onChange={e=>setPw(e.target.value)} type="password"/>
        <button style={{...btn(),width:"100%",marginBottom:"4px"}} onClick={submit}>{mode==="login"?"Sign in":"Create account"}</button>
        <div style={{display:"flex",alignItems:"center",gap:"10px",margin:"14px 0"}}>
          <div style={{flex:1,height:"1px",backgroundColor:C.border}}/><span style={{fontSize:"12px",color:C.muted}}>or</span><div style={{flex:1,height:"1px",backgroundColor:C.border}}/>
        </div>
        <button style={{...btn("google"),width:"100%",marginBottom:"10px"}} onClick={googleLogin}><GoogleLogo/>Continue with Google</button>
        <button style={{...btn("ghost"),width:"100%",fontSize:"13px",color:C.muted,textDecoration:"underline"}} onClick={onGuest}>Browse without an account</button>
        <div style={{fontSize:"13px",color:C.muted,marginTop:"14px",textAlign:"center"}}>
          {mode==="login"?<>Don't have an account? <span style={{color:C.periwinkle,cursor:"pointer",fontWeight:"600"}} onClick={()=>{setMode("signup");setErr("");}}>Sign up</span></>:<>Already have an account? <span style={{color:C.periwinkle,cursor:"pointer",fontWeight:"600"}} onClick={()=>{setMode("login");setErr("");}}>Sign in</span></>}
        </div>
      </div>
    </div>
  );
}

function EntityPage(){
  const[open,setOpen]=useState(null);
  return(
    <div>
      <div style={{marginBottom:"28px"}}>
        <div style={{fontSize:"24px",fontWeight:"800",letterSpacing:"-0.02em"}}>Business Entity Types</div>
        <div style={{fontSize:"14px",color:C.muted,marginTop:"4px"}}>Not sure which structure is right for you? Start here.</div>
      </div>
      {ENTITIES.map(e=>(
        <div key={e.id} style={{...card,padding:0,overflow:"hidden"}}>
          <div style={{padding:"18px 22px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}} onClick={()=>setOpen(open===e.id?null:e.id)}>
            <div style={{flex:1}}>
              <div style={{fontSize:"15px",fontWeight:"700"}}>{e.name}</div>
              <div style={{fontSize:"13px",color:C.muted,marginTop:"3px"}}>{e.tagline}</div>
            </div>
            <div style={{fontSize:"16px",color:C.muted,marginLeft:"12px",transform:open===e.id?"rotate(180deg)":"none",transition:"transform 0.2s"}}>v</div>
          </div>
          {open===e.id&&(
            <div style={{borderTop:`1px solid ${C.border}`,padding:"20px 22px"}}>
              <div style={{marginBottom:"16px"}}>
                <div style={{fontSize:"11px",fontWeight:"700",color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"6px"}}>Best for</div>
                <div style={{fontSize:"14px",lineHeight:"1.6"}}>{e.best}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"14px"}}>
                <div style={{backgroundColor:`${C.success}08`,borderRadius:"10px",padding:"14px",border:`1px solid ${C.success}20`}}>
                  <div style={{fontSize:"11px",fontWeight:"700",color:C.success,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"8px"}}>Pros</div>
                  {e.pros.map((p,i)=><div key={i} style={{fontSize:"13px",marginBottom:"5px",display:"flex",gap:"7px"}}><span style={{color:C.success,flexShrink:0}}>+</span>{p}</div>)}
                </div>
                <div style={{backgroundColor:`${C.error}06`,borderRadius:"10px",padding:"14px",border:`1px solid ${C.error}15`}}>
                  <div style={{fontSize:"11px",fontWeight:"700",color:C.error,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"8px"}}>Cons</div>
                  {e.cons.map((c,i)=><div key={i} style={{fontSize:"13px",marginBottom:"5px",display:"flex",gap:"7px"}}><span style={{color:C.error,flexShrink:0}}>-</span>{c}</div>)}
                </div>
              </div>
              <div style={{backgroundColor:`${C.periwinkle}10`,borderRadius:"10px",padding:"14px",marginBottom:"14px",border:`1px solid ${C.periwinkle}25`}}>
                <div style={{fontSize:"11px",fontWeight:"700",color:C.periwinkle,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"6px"}}>How you're taxed</div>
                <div style={{fontSize:"13px",lineHeight:"1.6"}}>{e.tax}</div>
              </div>
              <div style={{fontSize:"11px",fontWeight:"700",color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"10px"}}>How to get started</div>
              {e.steps.map((s,i)=>(
                <div key={i} style={{display:"flex",gap:"10px",marginBottom:"8px",alignItems:"flex-start"}}>
                  <div style={{width:"20px",height:"20px",borderRadius:"50%",backgroundColor:`${C.maroon}15`,color:C.maroon,fontSize:"11px",fontWeight:"700",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{i+1}</div>
                  <div style={{fontSize:"13px",lineHeight:"1.5"}}>{s}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      ))}
      <div style={{...card,backgroundColor:`${C.maroon}06`,border:`1px solid ${C.maroon}20`}}>
        <div style={{fontSize:"13px",lineHeight:"1.7"}}><strong>Not sure which one is right for you?</strong> Most solo service providers start with an LLC for the liability protection. If you're making significant profit and want to cut your tax bill, an S-Corp election on top of your LLC is usually the next move. Book a consultation and we'll walk through it together.</div>
      </div>
    </div>
  );
}

function ResourcesPage(){
  const[filter,setFilter]=useState("All");
  const cats=["All",...Array.from(new Set(RESOURCES.map(r=>r.cat)))];
  const vis=filter==="All"?RESOURCES:RESOURCES.filter(r=>r.cat===filter);
  return(
    <div>
      <div style={{marginBottom:"28px"}}>
        <div style={{fontSize:"24px",fontWeight:"800",letterSpacing:"-0.02em"}}>Resource Directory</div>
        <div style={{fontSize:"14px",color:C.muted,marginTop:"4px"}}>Curated tools and links for entrepreneurs at every stage.</div>
      </div>
      <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"16px"}}>
        {cats.map(c=><button key={c} style={{...btn("sm"),backgroundColor:filter===c?C.maroon:"transparent",color:filter===c?"#fff":C.muted,border:`1px solid ${filter===c?C.maroon:C.border}`}} onClick={()=>setFilter(c)}>{c}</button>)}
      </div>
      <div style={card}>
        {vis.map((r,i)=>(
          <a key={i} href={r.link} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"14px",padding:"13px 0",borderBottom:i===vis.length-1?"none":`1px solid ${C.border}`,textDecoration:"none"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:"14px",fontWeight:"600",color:C.text}}>{r.title}</div>
              <div style={{fontSize:"12px",color:C.muted,marginTop:"3px",lineHeight:"1.5"}}>{r.desc}</div>
            </div>
            <span style={{...tag("blue"),flexShrink:0,marginTop:"2px"}}>{r.cat}</span>
          </a>
        ))}
      </div>
    </div>
  );
}

function App(){
  const[user,setUser]=useState(null);
  const[guest,setGuest]=useState(false);
  const[loading,setLoading]=useState(true);
  const[page,setPage]=useState("home");
  const[checked,setChecked]=useState({});
  const[vault,setVault]=useState([]);
  const[appts,setAppts]=useState([]);
  const[saveMsg,setSaveMsg]=useState("");
  const[selDate,setSelDate]=useState(null);
  const[selTime,setSelTime]=useState(null);
  const[selSvc,setSelSvc]=useState("");
  const[cName,setCName]=useState("");
  const[cEmail,setCEmail]=useState("");
  const[booked,setBooked]=useState(false);
  const[uploadName,setUploadName]=useState("");

  useEffect(()=>{
    const u=getCurrentUser();
    if(u)loadUser(u);else setLoading(false);
  },[]);

  const loadUser=(u)=>{
    setUser(u);setGuest(false);
    setChecked(dbGet(u.uid,"checklist")||{});
    setVault(dbGet(u.uid,"vault")||[{name:"LLC Operating Agreement Template.pdf",size:"248 KB",date:"Jun 5, 2026",tag:"Legal"},{name:"EIN Application Guide.pdf",size:"120 KB",date:"Jun 1, 2026",tag:"Tax"}]);
    setAppts(dbGet(u.uid,"appointments")||[]);
    setLoading(false);
  };

  const flash=(m="Saved")=>{setSaveMsg(m);setTimeout(()=>setSaveMsg(""),2000);};

  const toggleCheck=(id)=>{const n={...checked,[id]:!checked[id]};setChecked(n);dbSet(user.uid,"checklist",n);flash("Progress saved");};
  const addDoc=()=>{if(!uploadName.trim())return;const n=[...vault,{name:uploadName.trim(),size:"—",date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),tag:"General"}];setVault(n);dbSet(user.uid,"vault",n);setUploadName("");flash("Document added");};
  const removeDoc=(i)=>{const n=vault.filter((_,x)=>x!==i);setVault(n);dbSet(user.uid,"vault",n);flash("Removed");};
  const bookAppt=()=>{if(!cName||!cEmail||!selDate||!selTime||!selSvc)return;const a={id:Date.now(),name:cName,email:cEmail,service:selSvc,date:selDate,time:selTime};const n=[...appts,a];setAppts(n);dbSet(user.uid,"appointments",n);setBooked(true);};
  const resetBook=()=>{setBooked(false);setCName("");setCEmail("");setSelDate(null);setSelTime(null);setSelSvc("");};
  const logout=()=>{setCurrentUser(null);setUser(null);setGuest(false);setChecked({});setVault([]);setAppts([]);setPage("home");};

  const done=Object.values(checked).filter(Boolean).length;
  const pct=Math.round((done/CHECKLIST.length)*100);
  const nav=(user&&!guest)?NAV_A:NAV_G;
  const locked=guest&&["checklist","vault","appointments"].includes(page);
  const show=locked?"locked":page;

  if(loading)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",backgroundColor:C.offwhite}}><div style={{color:C.muted}}>Loading...</div></div>;
  if(!user&&!guest)return<AuthScreen onLogin={loadUser} onGuest={()=>{setGuest(true);setPage("home");setLoading(false);}}/>;

  return(
    <div style={{fontFamily:"'Inter',-apple-system,sans-serif",backgroundColor:C.offwhite,minHeight:"100vh",display:"flex",color:C.text}}>
      {/* SIDEBAR */}
      <div style={{width:"220px",backgroundColor:C.surface,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",flexShrink:0,position:"fixed",height:"100vh",overflowY:"auto"}}>
        <div style={{padding:"24px 20px 18px",borderBottom:`1px solid ${C.border}`}}>
          <div style={{fontSize:"14px",fontWeight:"800",letterSpacing:"0.08em",color:C.maroon,textTransform:"uppercase"}}>CamTrust</div>
          <div style={{fontSize:"11px",color:C.muted,marginTop:"2px"}}>Connect Portal</div>
        </div>
        <div style={{padding:"14px 0",flex:1}}>
          <div style={{fontSize:"10px",fontWeight:"700",color:C.muted,letterSpacing:"0.1em",textTransform:"uppercase",padding:"0 20px",marginBottom:"4px"}}>Menu</div>
          {nav.map(item=>(
            <div key={item.id} style={{display:"flex",alignItems:"center",padding:"9px 20px",cursor:"pointer",fontSize:"13px",fontWeight:page===item.id?"600":"400",color:page===item.id?C.maroon:C.text,backgroundColor:page===item.id?`${C.maroon}08`:"transparent",borderLeft:page===item.id?`3px solid ${C.periwinkle}`:"3px solid transparent",transition:"all 0.15s"}} onClick={()=>setPage(item.id)}>{item.label}</div>
          ))}
        </div>
        <div style={{padding:"14px 20px",borderTop:`1px solid ${C.border}`}}>
          {user?(<>
            <div style={{fontSize:"13px",fontWeight:"600",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{user.name}</div>
            <div style={{fontSize:"11px",color:C.muted,marginTop:"1px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{user.email}</div>
            <button style={{...btn("ghost"),marginTop:"10px",padding:"5px 0",fontSize:"12px",color:C.muted}} onClick={logout}>Sign out</button>
          </>):(<>
            <div style={{fontSize:"12px",color:C.muted,marginBottom:"8px"}}>Browsing as guest</div>
            <button style={{...btn("outline"),fontSize:"12px",padding:"7px 12px"}} onClick={()=>{setGuest(false);setPage("home");}}>Sign in</button>
          </>)}
        </div>
      </div>

      {/* MAIN */}
      <div style={{marginLeft:"220px",flex:1,padding:"36px 40px",maxWidth:"860px"}}>
        {saveMsg&&<div style={{position:"fixed",top:"16px",right:"24px",backgroundColor:C.surface,border:`1px solid ${C.border}`,borderRadius:"8px",padding:"8px 14px",fontSize:"13px",color:C.success,zIndex:100}}>+ {saveMsg}</div>}

        {show==="locked"&&(
          <div>
            <div style={{marginBottom:"28px"}}>
              <div style={{fontSize:"24px",fontWeight:"800",letterSpacing:"-0.02em"}}>Create a free account</div>
              <div style={{fontSize:"14px",color:C.muted,marginTop:"4px"}}>Sign up to save your checklist, manage documents, and book appointments.</div>
            </div>
            <div style={{...card,textAlign:"center",padding:"48px 24px"}}>
              <div style={{fontSize:"15px",fontWeight:"600",marginBottom:"8px"}}>This feature requires an account</div>
              <div style={{fontSize:"14px",color:C.muted,marginBottom:"24px",lineHeight:"1.6"}}>Free and takes less than a minute.</div>
              <button style={btn()} onClick={()=>{setGuest(false);setPage("home");}}>Create a free account</button>
            </div>
          </div>
        )}

        {show==="home"&&(
          <div>
            <div style={{marginBottom:"28px"}}>
              <div style={{fontSize:"24px",fontWeight:"800",letterSpacing:"-0.02em"}}>{user?`Hey, ${user.name.split(" ")[0]}`:"Welcome to CamTrust Connect"}</div>
              <div style={{fontSize:"14px",color:C.muted,marginTop:"4px"}}>{user?"Here's where your business journey stands.":"Your small business resource hub."}</div>
            </div>
            {user&&(<>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px",marginBottom:"14px"}}>
                <div style={{backgroundColor:C.surface,borderRadius:"10px",padding:"18px",border:`1px solid ${C.border}`}}><div style={{fontSize:"26px",fontWeight:"800",color:C.maroon,letterSpacing:"-0.02em"}}>{done}/{CHECKLIST.length}</div><div style={{fontSize:"12px",color:C.muted,marginTop:"2px"}}>Checklist steps done</div></div>
                <div style={{backgroundColor:C.surface,borderRadius:"10px",padding:"18px",border:`1px solid ${C.border}`}}><div style={{fontSize:"26px",fontWeight:"800",color:C.maroon,letterSpacing:"-0.02em"}}>{vault.length}</div><div style={{fontSize:"12px",color:C.muted,marginTop:"2px"}}>Documents stored</div></div>
              </div>
              <div style={{...card,padding:"18px 22px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:"10px"}}>
                  <span style={{fontSize:"13px",fontWeight:"600"}}>Startup Progress</span>
                  <span style={{fontSize:"13px",color:C.periwinkle,fontWeight:"700"}}>{pct}%</span>
                </div>
                <div style={{height:"6px",backgroundColor:C.border,borderRadius:"100px",overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,backgroundColor:C.periwinkle,borderRadius:"100px",transition:"width 0.3s"}}/></div>
              </div>
            </>)}
            {!user&&<div style={{...card,backgroundColor:`${C.maroon}06`,border:`1px solid ${C.maroon}20`,marginBottom:"14px"}}><div style={{fontSize:"14px",lineHeight:"1.7"}}>CamTrust Consulting Group supports entrepreneurs, notary clients, and small business owners with the tools and guidance to move with confidence.</div><button style={{...btn(),marginTop:"14px"}} onClick={()=>{setGuest(false);setPage("home");}}>Create a free account</button></div>}
            <div style={card}>
              <div style={{fontSize:"14px",fontWeight:"700",marginBottom:"14px"}}>Explore</div>
              <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                {nav.filter(n=>n.id!=="home").map(item=><button key={item.id} style={btn("outline")} onClick={()=>setPage(item.id)}>{item.label}</button>)}
              </div>
            </div>
          </div>
        )}

        {show==="checklist"&&(
          <div>
            <div style={{marginBottom:"28px"}}>
              <div style={{fontSize:"24px",fontWeight:"800",letterSpacing:"-0.02em"}}>Business Startup Checklist</div>
              <div style={{fontSize:"14px",color:C.muted,marginTop:"4px"}}>{done} of {CHECKLIST.length} steps complete — saves automatically.</div>
            </div>
            <div style={{...card,padding:"18px 22px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"10px"}}><span style={{fontSize:"13px",fontWeight:"600"}}>Progress</span><span style={{fontSize:"13px",color:C.periwinkle,fontWeight:"700"}}>{pct}%</span></div>
              <div style={{height:"6px",backgroundColor:C.border,borderRadius:"100px",overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,backgroundColor:C.periwinkle,borderRadius:"100px",transition:"width 0.3s"}}/></div>
            </div>
            <div style={card}>
              {CHECKLIST.map((item,idx)=>(
                <div key={item.id} style={{display:"flex",alignItems:"flex-start",gap:"12px",padding:"12px 0",borderBottom:idx===CHECKLIST.length-1?"none":`1px solid ${C.border}`,cursor:"pointer"}} onClick={()=>toggleCheck(item.id)}>
                  <div style={{width:"18px",height:"18px",borderRadius:"5px",border:checked[item.id]?"none":`2px solid ${C.border}`,backgroundColor:checked[item.id]?C.periwinkle:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:"1px",transition:"all 0.15s"}}>
                    {checked[item.id]&&<span style={{color:"#fff",fontSize:"11px",fontWeight:"800"}}>+</span>}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:"6px"}}>
                      <span style={{fontSize:"14px",color:checked[item.id]?C.muted:C.text,textDecoration:checked[item.id]?"line-through":"none",lineHeight:"1.4"}}>{item.label}</span>
                      <span style={tag(["legal","tax"].includes(item.cat)?"maroon":"blue")}>{item.cat}</span>
                    </div>
                    <div style={{fontSize:"12px",color:C.muted,marginTop:"2px"}}>{item.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {show==="entities"&&<EntityPage/>}

        {show==="vault"&&(
          <div>
            <div style={{marginBottom:"28px"}}>
              <div style={{fontSize:"24px",fontWeight:"800",letterSpacing:"-0.02em"}}>Document Vault</div>
              <div style={{fontSize:"14px",color:C.muted,marginTop:"4px"}}>Your documents are saved to your account.</div>
            </div>
            <div style={card}>
              <div style={{fontSize:"14px",fontWeight:"700",marginBottom:"14px"}}>Add a Document</div>
              <input style={input} placeholder="Document name (e.g. Operating Agreement.pdf)" value={uploadName} onChange={e=>setUploadName(e.target.value)}/>
              <button style={btn()} onClick={addDoc}>Add to Vault</button>
            </div>
            <div style={card}>
              <div style={{fontSize:"14px",fontWeight:"700",marginBottom:"14px"}}>Your Documents ({vault.length})</div>
              {vault.length===0?<div style={{textAlign:"center",padding:"40px 20px",color:C.muted}}>No documents yet. Add one above.</div>:vault.map((f,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderRadius:"10px",border:`1px solid ${C.border}`,marginBottom:"8px"}}>
                  <div><div style={{fontSize:"14px",fontWeight:"600"}}>{f.name}</div><div style={{fontSize:"12px",color:C.muted}}>{f.size} · Added {f.date}</div></div>
                  <div style={{display:"flex",alignItems:"center",gap:"10px"}}><span style={tag("blue")}>{f.tag}</span><button style={{...btn("ghost"),fontSize:"12px",padding:"4px 8px",color:C.error}} onClick={()=>removeDoc(i)}>Remove</button></div>
                </div>
              ))}
            </div>
          </div>
        )}

        {show==="appointments"&&(
          <div>
            <div style={{marginBottom:"28px"}}>
              <div style={{fontSize:"24px",fontWeight:"800",letterSpacing:"-0.02em"}}>Book an Appointment</div>
              <div style={{fontSize:"14px",color:C.muted,marginTop:"4px"}}>Schedule time with CamTrust Consulting Group.</div>
            </div>
            {booked?(
              <div style={{...card,textAlign:"center",padding:"48px 24px"}}>
                <div style={{fontSize:"18px",fontWeight:"700",color:C.maroon,marginBottom:"8px"}}>Appointment Requested</div>
                <div style={{fontSize:"14px",color:C.muted,lineHeight:"1.7"}}><strong>{cName}</strong> — {selSvc}<br/>{selDate} at {selTime}<br/><br/>Confirmation will be sent to <strong>{cEmail}</strong>.</div>
                <button style={{...btn(),marginTop:"24px"}} onClick={resetBook}>Book Another</button>
              </div>
            ):(
              <>
                <div style={card}>
                  <div style={{fontSize:"14px",fontWeight:"700",marginBottom:"14px"}}>Your Information</div>
                  <input style={input} placeholder="Full name" value={cName} onChange={e=>setCName(e.target.value)}/>
                  <input style={input} placeholder="Email address" value={cEmail} onChange={e=>setCEmail(e.target.value)}/>
                  <select style={{...input,marginBottom:0}} value={selSvc} onChange={e=>setSelSvc(e.target.value)}>
                    <option value="">Select a service...</option>
                    {SERVICES.map(s=><option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                <div style={card}>
                  <div style={{fontSize:"14px",fontWeight:"700",marginBottom:"14px"}}>Select a Date</div>
                  <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                    {Object.keys(APPTS).map(d=><div key={d} style={{padding:"9px 13px",borderRadius:"8px",border:`1px solid ${selDate===d?C.periwinkle:C.border}`,backgroundColor:selDate===d?`${C.periwinkle}15`:C.surface,cursor:"pointer",fontSize:"13px",fontWeight:selDate===d?"600":"400",color:selDate===d?C.periwinkle:C.text,transition:"all 0.15s"}} onClick={()=>{setSelDate(d);setSelTime(null);}}>{d}</div>)}
                  </div>
                </div>
                {selDate&&<div style={card}>
                  <div style={{fontSize:"14px",fontWeight:"700",marginBottom:"14px"}}>Available Times — {selDate}</div>
                  <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                    {APPTS[selDate].map(t=><div key={t} style={{padding:"9px 13px",borderRadius:"8px",border:`1px solid ${selTime===t?C.periwinkle:C.border}`,backgroundColor:selTime===t?`${C.periwinkle}15`:C.surface,cursor:"pointer",fontSize:"13px",fontWeight:selTime===t?"600":"400",color:selTime===t?C.periwinkle:C.text,transition:"all 0.15s"}} onClick={()=>setSelTime(t)}>{t}</div>)}
                  </div>
                </div>}
                {appts.length>0&&<div style={card}><div style={{fontSize:"14px",fontWeight:"700",marginBottom:"14px"}}>Your Appointments</div>{appts.map(a=><div key={a.id} style={{padding:"10px 0",borderBottom:`1px solid ${C.border}`,fontSize:"14px"}}><strong>{a.service}</strong><span style={{color:C.muted}}> · {a.date} at {a.time}</span></div>)}</div>}
                <button style={{...btn(),opacity:(cName&&cEmail&&selDate&&selTime&&selSvc)?1:0.4,cursor:(cName&&cEmail&&selDate&&selTime&&selSvc)?"pointer":"not-allowed"}} onClick={bookAppt}>Confirm Appointment</button>
              </>
            )}
          </div>
        )}

        {show==="resources"&&<ResourcesPage/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
