// ── Storage ───────────────────────────────────────────────────────────────────
const sk=(uid,key)=>`ct_${uid}_${key}`;
function dbGet(uid,key){try{const v=localStorage.getItem(sk(uid,key));return v?JSON.parse(v):null;}catch{return null;}}
function dbSet(uid,key,val){try{localStorage.setItem(sk(uid,key),JSON.stringify(val));}catch{}}
function getAuthStore(){try{const v=localStorage.getItem("ct_auth");return v?JSON.parse(v):{};}catch{return{};}}
function saveAuthStore(s){localStorage.setItem("ct_auth",JSON.stringify(s));}
function getSavedUser(){try{const v=localStorage.getItem("ct_user");return v?JSON.parse(v):null;}catch{return null;}}
function saveUser(u){if(u)localStorage.setItem("ct_user",JSON.stringify(u));else localStorage.removeItem("ct_user");}

function GoogleLogo(){return(<svg width="15" height="15" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>);}

// ── Auth Modal ────────────────────────────────────────────────────────────────
function AuthModal({onLogin,onClose}){
  const [mode,setMode]=useState("login");
  const [name,setName]=useState("");
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [error,setError]=useState("");
  const submit=()=>{
    setError("");
    const store=getAuthStore();
    if(mode==="signup"){
      if(!name.trim()){setError("Please enter your name.");return;}
      if(store[email]){setError("An account with this email already exists.");return;}
      if(pw.length<6){setError("Password must be at least 6 characters.");return;}
      const u={uid:`u_${Date.now()}`,name:name.trim(),email,provider:"email"};
      store[email]={...u,pw};saveAuthStore(store);saveUser(u);onLogin(u);
    }else{
      const r=store[email];
      if(!r||r.pw!==pw){setError("Incorrect email or password.");return;}
      const u={uid:r.uid,name:r.name,email:r.email,provider:"email"};
      saveUser(u);onLogin(u);
    }
  };
  const google=()=>{
    const store=getAuthStore();
    const fe=`g_${Date.now()}@gmail.demo`;
    const u={uid:`g_${Date.now()}`,name:"Google User",email:fe,provider:"google"};
    store[fe]={...u,pw:null};saveAuthStore(store);saveUser(u);onLogin(u);
  };
  return(
    <div style={{position:"fixed",inset:0,backgroundColor:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:500,padding:"20px"}}>
      <div style={S.authCard}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}}>
          <div style={{fontSize:"12px",fontWeight:"800",letterSpacing:"0.1em",color:C.maroon,textTransform:"uppercase"}}>CamTrust</div>
          <button style={{background:"none",border:"none",cursor:"pointer",fontSize:"18px",color:C.muted}} onClick={onClose}>×</button>
        </div>
        <div style={{fontSize:"12px",color:C.muted,marginBottom:"20px"}}>Connect Portal</div>
        <div style={{fontSize:"20px",fontWeight:"800",marginBottom:"16px",letterSpacing:"-0.02em"}}>{mode==="login"?"Welcome back":"Create your account"}</div>
        {error&&<div style={S.errorText}>{error}</div>}
        {mode==="signup"&&<input style={S.input} placeholder="Full name" value={name} onChange={e=>setName(e.target.value)}/>}
        <input style={S.input} placeholder="Email address" value={email} onChange={e=>setEmail(e.target.value)} type="email"/>
        <input style={S.input} placeholder="Password" value={pw} onChange={e=>setPw(e.target.value)} type="password"/>
        <button style={{...S.btn(),width:"100%",marginBottom:"4px"}} onClick={submit}>{mode==="login"?"Sign in":"Create account"}</button>
        <div style={S.divider}><div style={S.dividerLine}/><span style={S.dividerText}>or</span><div style={S.dividerLine}/></div>
        <button style={{...S.btn("google"),width:"100%"}} onClick={google}><GoogleLogo/> Continue with Google</button>
        <div style={{fontSize:"13px",color:C.muted,marginTop:"14px",textAlign:"center"}}>
          {mode==="login"?<>No account? <span style={{color:C.periwinkle,cursor:"pointer",fontWeight:"600"}} onClick={()=>{setMode("signup");setError("");}}>Sign up</span></>
          :<>Have an account? <span style={{color:C.periwinkle,cursor:"pointer",fontWeight:"600"}} onClick={()=>{setMode("login");setError("");}}>Sign in</span></>}
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [showAuth,setShowAuth]=useState(false);
  const [page,setPage]=useState("home");
  const [checked,setChecked]=useState({});
  const [vault,setVault]=useState([
    {name:"LLC Operating Agreement Template.pdf",size:"248 KB",date:"Jun 5, 2026",tag:"Legal"},
    {name:"EIN Application Guide.pdf",size:"120 KB",date:"Jun 1, 2026",tag:"Tax"},
  ]);
  const [appts,setAppts]=useState([]);
  const [saveMsg,setSaveMsg]=useState("");
  const [selDate,setSelDate]=useState(null);
  const [selTime,setSelTime]=useState(null);
  const [selSvc,setSelSvc]=useState("");
  const [cName,setCName]=useState("");
  const [cEmail,setCEmail]=useState("");
  const [booked,setBooked]=useState(false);
  const [uploadName,setUploadName]=useState("");
  const [bpName,setBpName]=useState("");
  const [bpIndustry,setBpIndustry]=useState("");
  const [bpMission,setBpMission]=useState("");
  const [bpTarget,setBpTarget]=useState("");
  const [bpRevenue,setBpRevenue]=useState("");
  const [bpGoal,setBpGoal]=useState("");

  useEffect(()=>{
    const u=getSavedUser();
    if(u){
      setUser(u);
      setChecked(dbGet(u.uid,"checklist")||{});
      setVault(dbGet(u.uid,"vault")||[
        {name:"LLC Operating Agreement Template.pdf",size:"248 KB",date:"Jun 5, 2026",tag:"Legal"},
        {name:"EIN Application Guide.pdf",size:"120 KB",date:"Jun 1, 2026",tag:"Tax"},
      ]);
      setAppts(dbGet(u.uid,"appts")||[]);
    }
  },[]);

  const flash=(msg="Saved")=>{setSaveMsg(msg);setTimeout(()=>setSaveMsg(""),2000);};

  const handleLogin=(u)=>{
    setUser(u);setShowAuth(false);
    setChecked(dbGet(u.uid,"checklist")||checked);
    const saved=dbGet(u.uid,"vault");
    if(saved)setVault(saved);
    const savedAppts=dbGet(u.uid,"appts");
    if(savedAppts)setAppts(savedAppts);
    flash("Signed in — progress will now save automatically");
  };

  const toggleCheck=(id)=>{
    const n={...checked,[id]:!checked[id]};
    setChecked(n);
    if(user){dbSet(user.uid,"checklist",n);flash("Progress saved");}
  };

  const addFile=()=>{
    if(!uploadName.trim())return;
    const n=[...vault,{name:uploadName.trim(),size:"—",date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),tag:"General"}];
    setVault(n);
    if(user)dbSet(user.uid,"vault",n);
    setUploadName("");flash("Document added");
  };

  const removeFile=(i)=>{
    const n=vault.filter((_,j)=>j!==i);
    setVault(n);
    if(user)dbSet(user.uid,"vault",n);
    flash("Removed");
  };

  const book=()=>{
    if(!cName||!cEmail||!selDate||!selTime||!selSvc)return;
    const a={id:Date.now(),name:cName,email:cEmail,service:selSvc,date:selDate,time:selTime};
    const n=[...appts,a];setAppts(n);
    if(user)dbSet(user.uid,"appts",n);
    setBooked(true);
  };

  const resetBook=()=>{setBooked(false);setCName("");setCEmail("");setSelDate(null);setSelTime(null);setSelSvc("");};

  const logout=()=>{saveUser(null);setUser(null);flash("Signed out");};

  const done=Object.values(checked).filter(Boolean).length;
  const pct=Math.round((done/CHECKLIST.length)*100);

  return(
    <div style={S.app}>
      {showAuth&&<AuthModal onLogin={handleLogin} onClose={()=>setShowAuth(false)}/>}

      {saveMsg&&<div style={{position:"fixed",top:"16px",right:"24px",backgroundColor:C.surface,border:`1px solid ${C.border}`,borderRadius:"8px",padding:"8px 14px",fontSize:"13px",color:C.success,zIndex:300}}>✓ {saveMsg}</div>}

      {/* Sidebar */}
      <div style={S.sidebar} className="sidebar">
        <div style={S.logoArea}>
          <div style={S.logoText}>CamTrust</div>
          <div style={S.logoSub}>Connect Portal</div>
        </div>
        <div style={S.navSection}>
          <div style={S.navLabel}>Menu</div>
          {NAV.map(item=>(
            <div key={item.id} style={S.navItem(page===item.id)} onClick={()=>setPage(item.id)}>{item.label}</div>
          ))}
        </div>
        <div style={S.userBar}>
          {user?(
            <>
              <div style={{fontSize:"13px",fontWeight:"600",color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{user.name}</div>
              <div style={{fontSize:"11px",color:C.muted,marginTop:"1px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{user.email}</div>
              <button style={{...S.btn("ghost"),marginTop:"10px",padding:"5px 0",fontSize:"12px",color:C.muted}} onClick={logout}>Sign out</button>
            </>
          ):(
            <>
              <div style={{fontSize:"12px",color:C.muted,marginBottom:"8px"}}>Sign in to save your progress</div>
              <button style={{...S.btn("outline"),fontSize:"12px",padding:"7px 12px",width:"100%"}} onClick={()=>setShowAuth(true)}>Sign in / Sign up</button>
            </>
          )}
        </div>
      </div>

      {/* Mobile bottom nav */}
      <div className="bottom-nav">
        {NAV.map(item=>(
          <div key={item.id} className={`bottom-nav-item${page===item.id?" active":""}`} onClick={()=>setPage(item.id)}>
            <span className="icon">{item.icon}</span>
            <span>{item.label}</span>
          </div>
        ))}
      </div>

      {/* Main content */}
      <div style={S.main} className="main">

        {/* HOME */}
        {page==="home"&&(
          <div>
            <div style={S.pageHeader}>
              <div style={S.pageTitle}>{user?`Hey, ${user.name.split(" ")[0]}`:"Welcome to CamTrust Connect"}</div>
              <div style={S.pageSub}>Your small business resource hub — everything you need in one place.</div>
            </div>
            {!user&&(
              <div style={{...S.card,backgroundColor:`${C.maroon}06`,border:`1px solid ${C.maroon}20`,marginBottom:"14px"}}>
                <div style={{fontSize:"14px",color:C.text,lineHeight:"1.7",marginBottom:"12px"}}>CamTrust Consulting Group supports entrepreneurs, notary clients, and small business owners. All tools below are free to use. Create an account to save your progress and come back where you left off.</div>
                <button style={S.btn()} onClick={()=>setShowAuth(true)}>Create a free account</button>
              </div>
            )}
            {user&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px",marginBottom:"14px"}} className="grid2">
                <div style={S.statCard}><div style={S.statNumber}>{done}/{CHECKLIST.length}</div><div style={S.statLabel}>Checklist steps done</div></div>
                <div style={S.statCard}><div style={S.statNumber}>{vault.length}</div><div style={S.statLabel}>Documents stored</div></div>
              </div>
            )}
            {user&&(
              <div style={{...S.card,padding:"18px 22px",marginBottom:"14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:"10px"}}>
                  <span style={{fontSize:"13px",fontWeight:"600"}}>Startup Progress</span>
                  <span style={{fontSize:"13px",color:C.periwinkle,fontWeight:"700"}}>{pct}%</span>
                </div>
                <div style={S.progressTrack}><div style={S.progressBar(pct)}/></div>
              </div>
            )}
            <div style={S.card}>
              <div style={S.cardTitle}>Explore</div>
              <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                {NAV.filter(n=>n.id!=="home").map(item=>(
                  <button key={item.id} style={S.btn("outline")} onClick={()=>setPage(item.id)}>{item.label}</button>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* CHECKLIST */}
        {page==="checklist"&&(
          <div>
            <div style={S.pageHeader}>
              <div style={S.pageTitle}>Business Startup Checklist</div>
              <div style={S.pageSub}>{done} of {CHECKLIST.length} steps complete{user?" — saves automatically":"— sign in to save your progress"}.</div>
            </div>
            {!user&&(
              <div style={{...S.card,backgroundColor:`${C.periwinkle}08`,border:`1px solid ${C.periwinkle}30`,marginBottom:"14px"}}>
                <div style={{fontSize:"13px",color:C.text}}>You can use the checklist without an account. <span style={{color:C.periwinkle,cursor:"pointer",fontWeight:"600"}} onClick={()=>setShowAuth(true)}>Sign in</span> to save your progress.</div>
              </div>
            )}
            <div style={{...S.card,padding:"18px 22px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"10px"}}>
                <span style={{fontSize:"13px",fontWeight:"600"}}>Progress</span>
                <span style={{fontSize:"13px",color:C.periwinkle,fontWeight:"700"}}>{pct}%</span>
              </div>
              <div style={S.progressTrack}><div style={S.progressBar(pct)}/></div>
            </div>
            <div style={S.card}>
              {CHECKLIST.map((item,idx)=>(
                <div key={item.id} style={S.checkRow(idx===CHECKLIST.length-1)} onClick={()=>toggleCheck(item.id)}>
                  <div style={S.checkbox(checked[item.id])}>{checked[item.id]&&<span style={{color:"#fff",fontSize:"11px",fontWeight:"800"}}>✓</span>}</div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:"6px"}}>
                      <span style={S.checkLabel(checked[item.id])}>{item.label}</span>
                      <span style={S.tag(["legal","tax"].includes(item.category)?"maroon":"blue")}>{item.category}</span>
                    </div>
                    <div style={S.checkDesc}>{item.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ENTITY TYPES */}
        {page==="entities"&&(
          <div>
            <div style={S.pageHeader}><div style={S.pageTitle}>Business Entity Types</div><div style={S.pageSub}>Not sure which structure is right for you? Start here.</div></div>
            {ENTITIES.map(e=>{
              const [open,setOpen]=useState(false);
              return(
                <div key={e.id} style={{...S.card,padding:0,overflow:"hidden"}}>
                  <div style={{padding:"18px 22px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}} onClick={()=>setOpen(!open)}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"15px",fontWeight:"700",color:C.text}}>{e.name}</div>
                      <div style={{fontSize:"13px",color:C.muted,marginTop:"3px"}}>{e.tagline}</div>
                    </div>
                    <div style={{fontSize:"12px",color:C.muted,marginLeft:"12px",flexShrink:0,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s ease"}}>▼</div>
                  </div>
                  {open&&(
                    <div style={{borderTop:`1px solid ${C.border}`,padding:"20px 22px"}}>
                      <div style={{marginBottom:"18px"}}>
                        <div style={{fontSize:"11px",fontWeight:"700",color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"6px"}}>Best for</div>
                        <div style={{fontSize:"14px",color:C.text,lineHeight:"1.6"}}>{e.best}</div>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px",marginBottom:"14px"}}>
                        <div style={{backgroundColor:`${C.success}08`,borderRadius:"10px",padding:"16px",border:`1px solid ${C.success}20`}}>
                          <div style={{fontSize:"11px",fontWeight:"700",color:C.success,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"10px"}}>Pros</div>
                          {e.pros.map((p,i)=><div key={i} style={{fontSize:"13px",color:C.text,marginBottom:"6px",display:"flex",gap:"8px"}}><span style={{color:C.success,flexShrink:0}}>+</span>{p}</div>)}
                        </div>
                        <div style={{backgroundColor:`${C.error}06`,borderRadius:"10px",padding:"16px",border:`1px solid ${C.error}15`}}>
                          <div style={{fontSize:"11px",fontWeight:"700",color:C.error,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"10px"}}>Cons</div>
                          {e.cons.map((c,i)=><div key={i} style={{fontSize:"13px",color:C.text,marginBottom:"6px",display:"flex",gap:"8px"}}><span style={{color:C.error,flexShrink:0}}>-</span>{c}</div>)}
                        </div>
                      </div>
                      <div style={{backgroundColor:`${C.periwinkle}10`,borderRadius:"10px",padding:"14px 16px",marginBottom:"16px",border:`1px solid ${C.periwinkle}25`}}>
                        <div style={{fontSize:"11px",fontWeight:"700",color:C.periwinkle,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"6px"}}>How you're taxed</div>
                        <div style={{fontSize:"13px",color:C.text,lineHeight:"1.6"}}>{e.tax}</div>
                      </div>
                      <div>
                        <div style={{fontSize:"11px",fontWeight:"700",color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"10px"}}>How to get started</div>
                        {e.steps.map((step,i)=>(
                          <div key={i} style={{display:"flex",gap:"12px",marginBottom:"8px",alignItems:"flex-start"}}>
                            <div style={{width:"20px",height:"20px",borderRadius:"50%",backgroundColor:`${C.maroon}15`,color:C.maroon,fontSize:"11px",fontWeight:"700",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:"1px"}}>{i+1}</div>
                            <div style={{fontSize:"13px",color:C.text,lineHeight:"1.5"}}>{step}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
            <div style={{...S.card,backgroundColor:`${C.maroon}06`,border:`1px solid ${C.maroon}20`}}>
              <div style={{fontSize:"13px",color:C.text,lineHeight:"1.7"}}><strong>Not sure which one is right for you?</strong> Most solo service providers start with an LLC for the liability protection. Book a consultation and we'll walk through it together.</div>
            </div>
          </div>
        )}

        {/* VAULT */}
        {page==="vault"&&(
          <div>
            <div style={S.pageHeader}><div style={S.pageTitle}>Document Vault</div><div style={S.pageSub}>{user?"Your documents are saved to your account.":"Add and reference your documents. Sign in to save them permanently."}</div></div>
            {!user&&(
              <div style={{...S.card,backgroundColor:`${C.periwinkle}08`,border:`1px solid ${C.periwinkle}30`,marginBottom:"14px"}}>
                <div style={{fontSize:"13px",color:C.text}}><span style={{color:C.periwinkle,cursor:"pointer",fontWeight:"600"}} onClick={()=>setShowAuth(true)}>Sign in</span> to save your documents to your account permanently.</div>
              </div>
            )}
            <div style={S.card}>
              <div style={S.cardTitle}>Add a Document</div>
              <input style={S.input} placeholder="Document name (e.g. Operating Agreement.pdf)" value={uploadName} onChange={e=>setUploadName(e.target.value)}/>
              <button style={S.btn()} onClick={addFile}>Add to Vault</button>
            </div>
            <div style={S.card}>
              <div style={S.cardTitle}>Your Documents ({vault.length})</div>
              {vault.length===0?<div style={S.emptyState}><div style={{fontSize:"14px"}}>No documents yet. Add one above.</div></div>
              :vault.map((f,i)=>(
                <div key={i} style={S.vaultRow}>
                  <div><div style={{fontSize:"14px",fontWeight:"600"}}>{f.name}</div><div style={{fontSize:"12px",color:C.muted}}>{f.size} · Added {f.date}</div></div>
                  <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                    <span style={S.tag("blue")}>{f.tag}</span>
                    <button style={{...S.btn("ghost"),fontSize:"12px",padding:"4px 8px",color:C.error}} onClick={()=>removeFile(i)}>Remove</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* APPOINTMENTS */}
        {page==="appointments"&&(
          <div>
            <div style={S.pageHeader}><div style={S.pageTitle}>Book an Appointment</div><div style={S.pageSub}>Schedule time with CamTrust Consulting Group.</div></div>
            {booked?(
              <div style={{...S.card,textAlign:"center",padding:"48px 24px"}}>
                <div style={{fontSize:"18px",fontWeight:"700",color:C.maroon,marginBottom:"8px"}}>Appointment Requested</div>
                <div style={{fontSize:"14px",color:C.muted,lineHeight:"1.7"}}><strong>{cName}</strong> — {selSvc}<br/>{selDate} at {selTime}<br/><br/>Confirmation will be sent to <strong>{cEmail}</strong>.</div>
                <button style={{...S.btn(),marginTop:"24px"}} onClick={resetBook}>Book Another</button>
              </div>
            ):(
              <>
                <div style={S.card}>
                  <div style={S.cardTitle}>Your Information</div>
                  <input style={S.input} placeholder="Full name" value={cName} onChange={e=>setCName(e.target.value)}/>
                  <input style={S.input} placeholder="Email address" value={cEmail} onChange={e=>setCEmail(e.target.value)}/>
                  <select style={S.select} value={selSvc} onChange={e=>setSelSvc(e.target.value)}>
                    <option value="">Select a service...</option>
                    {SERVICE_TYPES.map(s=><option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                <div style={S.card}>
                  <div style={S.cardTitle}>Select a Date</div>
                  <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                    {Object.keys(APPOINTMENTS).map(d=><div key={d} style={S.apptSlot(selDate===d)} onClick={()=>{setSelDate(d);setSelTime(null);}}>{d}</div>)}
                  </div>
                </div>
                {selDate&&(
                  <div style={S.card}>
                    <div style={S.cardTitle}>Available Times — {selDate}</div>
                    <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                      {APPOINTMENTS[selDate].map(t=><div key={t} style={S.apptSlot(selTime===t)} onClick={()=>setSelTime(t)}>{t}</div>)}
                    </div>
                  </div>
                )}
                {appts.length>0&&(
                  <div style={S.card}>
                    <div style={S.cardTitle}>Your Appointments</div>
                    {appts.map(a=><div key={a.id} style={{padding:"10px 0",borderBottom:`1px solid ${C.border}`,fontSize:"14px"}}><strong>{a.service}</strong><span style={{color:C.muted}}> · {a.date} at {a.time}</span></div>)}
                  </div>
                )}
                <button style={{...S.btn(),opacity:(cName&&cEmail&&selDate&&selTime&&selSvc)?1:0.4,cursor:(cName&&cEmail&&selDate&&selTime&&selSvc)?"pointer":"not-allowed"}} onClick={book}>Confirm Appointment</button>
              </>
            )}
          </div>
        )}

        {/* RESOURCES */}
        {page==="resources"&&(()=>{
          const [filter,setFilter]=useState("All");
          const cats=["All",...Array.from(new Set(RESOURCES.map(r=>r.category)))];
          const visible=filter==="All"?RESOURCES:RESOURCES.filter(r=>r.category===filter);
          return(
            <div>
              <div style={S.pageHeader}><div style={S.pageTitle}>Resource Directory</div><div style={S.pageSub}>Curated tools and links for entrepreneurs at every stage.</div></div>
              <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"18px"}}>
                {cats.map(cat=><button key={cat} style={{...S.btn("sm"),backgroundColor:filter===cat?C.maroon:"transparent",color:filter===cat?"#fff":C.muted,border:`1px solid ${filter===cat?C.maroon:C.border}`}} onClick={()=>setFilter(cat)}>{cat}</button>)}
              </div>
              <div style={S.card}>
                {visible.map((r,i)=>(
                  <a key={i} href={r.link} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"16px",padding:"14px 0",borderBottom:i===visible.length-1?"none":`1px solid ${C.border}`,textDecoration:"none"}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"14px",fontWeight:"600",color:C.text}}>{r.title}</div>
                      <div style={{fontSize:"12px",color:C.muted,marginTop:"3px",lineHeight:"1.5"}}>{r.desc}</div>
                    </div>
                    <span style={{...S.tag("blue"),flexShrink:0,marginTop:"2px"}}>{r.category}</span>
                  </a>
                ))}
              </div>
            </div>
          );
        })()}

        {/* BUSINESS PLAN */}
        {page==="bizplan"&&(
          <div>
            <div style={S.pageHeader}><div style={S.pageTitle}>Business Plan Builder</div><div style={S.pageSub}>Build your one-page business plan. Fill in each section below.</div></div>
            <div style={S.card}>
              <div style={S.cardTitle}>Business Basics</div>
              <label style={{fontSize:"12px",fontWeight:"600",color:C.muted,display:"block",marginBottom:"4px"}}>Business Name</label>
              <input style={S.input} placeholder="e.g. CamTrust Consulting Group" value={bpName} onChange={e=>setBpName(e.target.value)}/>
              <label style={{fontSize:"12px",fontWeight:"600",color:C.muted,display:"block",marginBottom:"4px"}}>Industry</label>
              <input style={S.input} placeholder="e.g. HR Consulting / Notary Services" value={bpIndustry} onChange={e=>setBpIndustry(e.target.value)}/>
              <label style={{fontSize:"12px",fontWeight:"600",color:C.muted,display:"block",marginBottom:"4px"}}>Mission Statement</label>
              <input style={S.input} placeholder="We help small businesses..." value={bpMission} onChange={e=>setBpMission(e.target.value)}/>
            </div>
            <div style={S.card}>
              <div style={S.cardTitle}>Market and Revenue</div>
              <label style={{fontSize:"12px",fontWeight:"600",color:C.muted,display:"block",marginBottom:"4px"}}>Target Customer</label>
              <input style={S.input} placeholder="e.g. Solo entrepreneurs and small business owners in Nevada" value={bpTarget} onChange={e=>setBpTarget(e.target.value)}/>
              <label style={{fontSize:"12px",fontWeight:"600",color:C.muted,display:"block",marginBottom:"4px"}}>How You Make Money</label>
              <input style={S.input} placeholder="e.g. Flat-rate consulting packages, notary services, document prep" value={bpRevenue} onChange={e=>setBpRevenue(e.target.value)}/>
              <label style={{fontSize:"12px",fontWeight:"600",color:C.muted,display:"block",marginBottom:"4px"}}>90-Day Goal</label>
              <input style={S.input} placeholder="e.g. Sign 5 paying clients, launch website, earn $3K/month" value={bpGoal} onChange={e=>setBpGoal(e.target.value)}/>
            </div>
            {(bpName||bpMission||bpTarget)&&(
              <div style={{...S.card,backgroundColor:`${C.maroon}04`,border:`1px solid ${C.maroon}20`}}>
                <div style={S.cardTitle}>Your One-Page Business Plan</div>
                {bpName&&<div style={{marginBottom:"12px"}}><div style={{fontSize:"11px",fontWeight:"700",color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"4px"}}>Business</div><div style={{fontSize:"14px",color:C.text}}>{bpName}{bpIndustry&&` · ${bpIndustry}`}</div></div>}
                {bpMission&&<div style={{marginBottom:"12px"}}><div style={{fontSize:"11px",fontWeight:"700",color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"4px"}}>Mission</div><div style={{fontSize:"14px",color:C.text}}>{bpMission}</div></div>}
                {bpTarget&&<div style={{marginBottom:"12px"}}><div style={{fontSize:"11px",fontWeight:"700",color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"4px"}}>Target Customer</div><div style={{fontSize:"14px",color:C.text}}>{bpTarget}</div></div>}
                {bpRevenue&&<div style={{marginBottom:"12px"}}><div style={{fontSize:"11px",fontWeight:"700",color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"4px"}}>Revenue Model</div><div style={{fontSize:"14px",color:C.text}}>{bpRevenue}</div></div>}
                {bpGoal&&<div><div style={{fontSize:"11px",fontWeight:"700",color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"4px"}}>90-Day Goal</div><div style={{fontSize:"14px",color:C.text}}>{bpGoal}</div></div>}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
